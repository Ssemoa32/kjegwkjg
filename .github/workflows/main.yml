name: RDP

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'    # تشغيل تلقائي كل 6 ساعات

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 10        # المهلة 10 دقائق (كافية وآمنة)
    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389

      - name: Create RDP User
        run: |
          $password = "P@ssw0rd123!" | ConvertTo-SecureString -AsPlainText -Force
          New-LocalUser -Name "rdpuser" -Password $password -PasswordNeverExpires -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "rdpuser"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "rdpuser"

      - name: Install Tailscale
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "$env:TEMP\tailscale.exe"
          Start-Process -FilePath "$env:TEMP\tailscale.exe" -ArgumentList "/S" -Wait -NoNewWindow
          Remove-Item "$env:TEMP\tailscale.exe" -Force

      - name: Connect Tailscale
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname="gh-runner-$env:GITHUB_RUN_ID"
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV

      - name: Show RDP Info
        run: |
          Write-Host "=========================="
          Write-Host "RDP Connection Info:"
          Write-Host "Address: $env:TAILSCALE_IP"
          Write-Host "User: rdpuser"
          Write-Host "Pass: P@ssw0rd123!"
          Write-Host "=========================="
          while ($true) { Start-Sleep -Seconds 60 }
