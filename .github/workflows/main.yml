name: RDP

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create RDP User with Secure Password
        run: |
          Add-Type -AssemblyName System.Security
          $charSet = @{
            Upper   = 65..90  | ForEach-Object { [char]$_ }
            Lower   = 97..122 | ForEach-Object { [char]$_ }
            Number  = 48..57  | ForEach-Object { [char]$_ }
            Special = '!','@','#','$','%','^','&','*','(',')'
          }
          $rawPassword = @()
          $rawPassword += $charSet.Upper   | Get-Random -Count 4
          $rawPassword += $charSet.Lower   | Get-Random -Count 4
          $rawPassword += $charSet.Number  | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) {
            Set-LocalUser -Name "RDP" -Password $securePass
          } else {
            New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          }
          Add-LocalGroupMember -Group "Administrators" -Member "RDP" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP" -ErrorAction SilentlyContinue
          echo "RDP_PASS=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTHKEY --hostname=gh-runner-$env:GITHUB_RUN_ID
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
            $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
            Start-Sleep -Seconds 5
            $retries++
          }
          if (-not $tsIP) { Write-Error "Tailscale IP not assigned."; exit 1 }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Auto-Start Bot on Session Begin
        run: |
          $startupScript = @"
          # ===== سكربت تشغيل البوت التلقائي =====
          # عدّل هذا القسم بمسار البوت الخاص بك
          # مثال: python C:\bot\bot.py
          # مثال: node C:\bot\index.js

          # تشغيل البوت تلقائياً عند بدء الجلسة
          # Start-Process python -ArgumentList "C:\bot\bot.py" -WindowStyle Hidden

          Write-Host "[$(Get-Date)] Bot startup script executed."
          "@
          $startupScript | Out-File -FilePath "C:\startup_bot.ps1" -Encoding UTF8

          # تسجيل المهمة في Task Scheduler لتشغيل البوت عند بدء الجلسة
          $action  = New-ScheduledTaskAction -Execute "powershell.exe" `
                       -Argument "-ExecutionPolicy Bypass -File C:\startup_bot.ps1"
          $trigger = New-ScheduledTaskTrigger -AtLogOn
          $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries
          Register-ScheduledTask -TaskName "BotAutoStart" `
            -Action $action -Trigger $trigger -Settings $settings `
            -RunLevel Highest -Force
          Write-Host "[$(Get-Date)] Task Scheduler configured successfully."

      - name: Verify RDP Accessibility
        run: |
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $testResult.TcpTestSucceeded) {
            Write-Error "TCP connection to RDP port 3389 failed"
            exit 1
          }
          Write-Host "TCP connectivity successful!"

      - name: Show Connection Info & Keep Alive
        run: |
          Write-Host "`n========== RDP ACCESS INFO =========="
          Write-Host "Address  : $env:TAILSCALE_IP"
          Write-Host "Username : RDP"
          Write-Host "Password : $env:RDP_PASS"
          Write-Host "Port     : 3389"
          Write-Host "====================================`n"
          Write-Host "Bot startup script : C:\startup_bot.ps1"
          Write-Host "Task Scheduler     : BotAutoStart (runs at logon)"
          Write-Host "====================================`n"

          # حفظ معلومات الاتصال في ملف للرجوع إليها
          $info = @"
          IP=$env:TAILSCALE_IP
          USERNAME=RDP
          PASSWORD=$env:RDP_PASS
          DATE=$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
          "@
          $info | Out-File -FilePath "C:\rdp_info.txt" -Encoding UTF8

          # الإبقاء على الجلسة نشطة
          while ($true) {
            Write-Host "[$(Get-Date)] RDP Active - Session running..."
            Start-Sleep -Seconds 300
          }
